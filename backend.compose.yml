services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./service/.env
    ports:
      - "5432:5432"
    volumes:
      - backend_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./service/.env
    ports:
      - "1412:1412"
    depends_on:
      db:
        condition: service_healthy

volumes:
  backend_pgdata:
